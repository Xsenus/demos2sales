server {
    listen 80;
    listen [::]:80;
    server_name demos2sales.irbistech.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        auth_basic off;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name demos2sales.irbistech.com;

    ssl_certificate /etc/letsencrypt/live/demos2sales.irbistech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demos2sales.irbistech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/demos2sales/current/frontend/dist;
    index index.html;

    client_max_body_size 25m;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:7861;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
